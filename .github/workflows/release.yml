name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core
        run: sudo apt-get install -y bats
      - name: Run test suite
        run: tests/run.sh --integration

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Verify changelog entry
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          grep -q "## \[${VERSION}\]" CHANGELOG.md || {
            echo "error: CHANGELOG.md has no entry for [${VERSION}] — add one to main before tagging"
            exit 1
          }
          echo "OK: CHANGELOG.md has entry for [${VERSION}]"

      - name: Configure git identity and credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Package
        run: scripts/package.sh --skip-tests --skip-tag

      - name: Verify archive exists
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          [ -f "dist/sdlc-plugin-v${VERSION}.tar.gz" ] || { echo "error: archive not found"; exit 1; }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sdlc-plugin-v*.tar.gz

      - name: Open PR to bump marketplace ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION=${GITHUB_REF_NAME}
          BRANCH="chore/marketplace-ref-${VERSION}"

          jq --arg v "$VERSION" '.plugins[0].source.ref = $v' \
            .claude-plugin/marketplace.json > tmp.json
          jq . tmp.json > /dev/null || { echo "error: marketplace.json invalid JSON after update"; exit 1; }
          mv tmp.json .claude-plugin/marketplace.json

          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: bump marketplace ref to ${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: bump marketplace.json ref to ${VERSION}" \
            --body "Auto-generated by the release workflow after publishing ${VERSION}. Updates the marketplace.json ref so consumers installing via \`/plugin install\` pick up the new release. Safe to merge once CI passes." \
            --base main \
            --head "$BRANCH"
